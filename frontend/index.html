<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>LifeVault — Your Life. One Secure Vault.</title>
    <meta
      name="description"
      content="LifeVault is a secure emergency information management platform. Store your medical, personal, and emergency information safely. Share only what matters in a crisis."
    />
    <meta name="keywords" content="emergency information, medical ID, QR code, health vault, emergency contacts" />
    <meta name="author" content="LifeVault" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LifeVault — Your Life. One Secure Vault." />
    <meta property="og:description" content="Store your emergency information securely. One QR scan can save your life." />
    <meta property="og:url" content="https://lifevault.app" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=Poppins:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#2563EB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />

    <!-- Apply saved theme before React loads to avoid flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('lv_dark_mode');
          var isDark = stored !== null
            ? JSON.parse(stored)
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          /* ignore — private mode or blocked storage */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
