# LifeVault — Docker Compose (local production simulation)
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill in values
#   2. docker compose up --build
#   3. Open http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifevault-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
  # Optional: expose API directly for debugging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: lifevault-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
