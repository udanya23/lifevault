# Render Blueprint — optional one-click deploy reference
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lifevault-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: noreply@lifevault.app

  - type: web
    name: lifevault-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerCommand: ""
    envVars:
      - key: VITE_API_URL
        value: /api/v1
